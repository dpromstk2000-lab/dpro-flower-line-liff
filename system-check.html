<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#214c3b">
  <title>システム検査｜DPRO フラワーショップ</title>
  <link rel="stylesheet" href="common.css?v=FLOWER-9">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">✿</div>
        <div>
          <div class="brand-title">DPRO フラワーショップ</div>
          <div class="brand-subtitle">注文・制作・配達管理 LINE</div>
        </div>
      </div>
      <nav class="topnav" id="topnav"></nav>
    </div>
  </header>
  
<main class="page-shell">
  <section class="hero">
    <div class="eyebrow">SYSTEM CHECK</div>
    <h1>営業前の一括システム検査。</h1>
    <p>Worker、Supabase、テーブル、30分枠、電話番号正規化、デモ保護を確認します。</p>
  </section>

  <section class="card">
    <h2>管理コード</h2>
    <div class="code-row">
      <input id="adminCode" type="password" inputmode="numeric" placeholder="管理コード">
      <button id="runCheck" class="btn btn-primary">一括検査</button>
      <button id="clearCode" class="btn btn-danger">削除</button>
    </div>
    <div class="actions">
      <button id="prepareDemo" class="btn btn-rose">デモデータを再生成</button>
    </div>
    <div id="alert" class="hidden"></div>
  </section>

  <section class="grid grid-2" style="margin-top:18px">
    <article class="card">
      <h2>公開API</h2>
      <div id="publicChecks" class="check-list">
        <div class="check-item"><span>Workerヘルス</span><span class="check-wait">未検査</span></div>
      </div>
    </article>
    <article class="card">
      <h2>管理API・DB</h2>
      <div id="adminChecks" class="check-list">
        <div class="check-item"><span>管理API</span><span class="check-wait">未検査</span></div>
      </div>
    </article>
  </section>

  <section class="card" style="margin-top:18px">
    <h2>検査結果JSON</h2>
    <pre id="jsonResult" style="white-space:pre-wrap;overflow:auto;font-size:.78rem">未検査</pre>
  </section>

  <footer class="footer">
    <div>DPRO フラワーショップ system-check</div>
    <div id="appVersion"></div>
  </footer>
</main>

  <nav class="mobile-bottom-nav" id="mobileNav"></nav>
  <script src="config.js?v=FLOWER-9"></script>
  <script src="common.js?v=FLOWER-9"></script>
  <script src="system-check-v9.js"></script>
</body>
</html>
