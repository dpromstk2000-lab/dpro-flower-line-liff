<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#214c3b">
  <title>マイページ｜DPRO フラワーショップ</title>
  <link rel="stylesheet" href="common.css?v=FLOWER-15">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">✿</div>
        <div>
          <div class="brand-title">DPRO フラワーショップ</div>
          <div class="brand-subtitle">注文・制作・配達管理 LINE</div>
        </div>
      </div>
      <nav class="topnav" id="topnav"></nav>
    </div>
  </header>
  
<main class="page-shell">
  <section class="hero">
    <div class="eyebrow">お客様マイページ</div>
    <h1>注文状況と、これまでのお花。</h1>
    <p>現在の制作状況、受取・配達日時、過去の注文を確認できます。</p>
  </section>

  <div id="createdNotice" class="hidden"></div>
  <div id="pageAlert" class="hidden"></div>

  <section class="grid grid-3" id="profileStats">
    <article class="card stat"><span class="stat-label">お客様</span><span class="stat-value" id="customerName">―</span></article>
    <article class="card stat"><span class="stat-label">注文回数</span><span class="stat-value" id="orderCount">―</span></article>
    <article class="card stat"><span class="stat-label">登録済み届け先</span><span class="stat-value" id="addressCount">―</span></article>
  </section>

  <h2 class="section-title">ご注文</h2>
  <div id="orders" class="grid grid-2">
    <div class="card loading">注文情報を読み込んでいます…</div>
  </div>

  <h2 class="section-title">記念日</h2>
  <div id="anniversaries" class="grid grid-3">
    <div class="card loading">記念日を読み込んでいます…</div>
  </div>

  <footer class="footer">
    <div>DPRO フラワーショップ お客様マイページ</div>
    <div id="appVersion"></div>
  </footer>
</main>

  <nav class="mobile-bottom-nav" id="mobileNav"></nav>
  <script src="config.js?v=FLOWER-15"></script>
  <script src="common.js?v=FLOWER-15"></script>
  <script src="member-v15.js"></script>
</body>
</html>
