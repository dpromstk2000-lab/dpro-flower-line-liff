<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#214c3b">
  <title>電話・店頭注文｜DPRO フラワーショップ</title>
  <link rel="stylesheet" href="common.css?v=FLOWER-15">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">✿</div>
        <div>
          <div class="brand-title">DPRO フラワーショップ</div>
          <div class="brand-subtitle">電話・店頭注文受付</div>
        </div>
      </div>
      <nav class="topnav" id="topnav"></nav>
    </div>
  </header>

  <main class="page-shell">
    <section id="adminLock" class="card admin-lock">
      <h2>電話・店頭注文受付</h2>
      <p>管理コードを入力してください。デモURLでは自動設定されます。</p>
      <div class="code-row">
        <input id="adminCode" type="password" inputmode="numeric" placeholder="管理コード">
        <button id="loginButton" class="btn btn-primary">開く</button>
        <button id="clearCodeButton" class="btn btn-danger">削除</button>
      </div>
      <div id="loginAlert" class="hidden"></div>
    </section>

    <section id="counterApp" class="hidden">
      <section class="hero">
        <div class="eyebrow">PHONE / COUNTER ORDER</div>
        <h1>電話・店頭のご注文も、同じ顧客台帳へ。</h1>
        <p>既存顧客を電話番号・氏名・顧客番号から検索し、そのまま注文を登録できます。</p>
        <div class="hero-actions">
          <a class="btn btn-ghost" href="owner.html?demo=1">オーナー管理へ戻る</a>
        </div>
      </section>

      <div id="pageAlert" class="hidden"></div>

      <div class="counter-layout">
        <aside class="counter-sidebar">
          <section class="card">
            <h2>既存顧客検索</h2>
            <div class="field">
              <label for="customerSearch">氏名・電話番号・顧客番号・会社名</label>
              <input id="customerSearch" placeholder="例：09012345678">
            </div>
            <div class="actions">
              <button id="customerSearchButton" class="btn btn-primary">検索</button>
              <button id="newCustomerButton" class="btn btn-secondary">新規顧客</button>
            </div>
            <div id="customerSearchAlert" class="hidden"></div>
            <div id="customerSearchResults" class="customer-search-results"></div>
            <div id="selectedCustomer" class="selected-customer"></div>
          </section>

          <section class="card" style="margin-top:18px">
            <h2>注文内容</h2>
            <div id="counterSummary" class="summary-list"></div>
          </section>
        </aside>

        <section>
          <form id="counterOrderForm" novalidate>
            <article class="card">
              <h2>1. 受付方法・お客様</h2>
              <div class="form-grid">
                <div class="field">
                  <label class="required" for="sourceType">受付方法</label>
                  <select id="sourceType" required>
                    <option value="phone">電話注文</option>
                    <option value="counter">店頭注文</option>
                  </select>
                </div>
                <div class="field">
                  <label for="selectedCustomerNumber">顧客番号</label>
                  <input id="selectedCustomerNumber" readonly placeholder="新規登録">
                </div>
                <div class="field">
                  <label class="required" for="customerName">お名前</label>
                  <input id="customerName" autocomplete="name" required>
                </div>
                <div class="field">
                  <label class="required" for="customerPhone">電話番号</label>
                  <input id="customerPhone" inputmode="tel" autocomplete="tel" required>
                </div>
                <div class="field">
                  <label for="customerEmail">メールアドレス</label>
                  <input id="customerEmail" type="email" autocomplete="email">
                </div>
                <div class="field">
                  <label for="customerCompany">会社名</label>
                  <input id="customerCompany" autocomplete="organization">
                </div>
              </div>
            </article>

            <article class="card" style="margin-top:18px">
              <div class="order-item-head">
                <h2 style="margin:0">2. 商品</h2>
                <button id="addItemButton" type="button" class="btn btn-secondary btn-small">商品を追加</button>
              </div>
              <div id="orderItems" class="order-item-list">
                <div class="loading">商品を読み込んでいます…</div>
              </div>
            </article>

            <article class="card" style="margin-top:18px">
              <h2>3. 用途・受取日時</h2>
              <div class="form-grid">
                <div class="field">
                  <label class="required" for="usageType">用途</label>
                  <select id="usageType" required>
                    <option value="">選択してください</option>
                    <option value="birthday">誕生日</option>
                    <option value="wedding_anniversary">結婚記念日</option>
                    <option value="mother_day">母の日</option>
                    <option value="father_day">父の日</option>
                    <option value="farewell">送別・退職</option>
                    <option value="entrance_graduation">入学・卒業</option>
                    <option value="opening">開店・開業祝い</option>
                    <option value="anniversary">周年祝い</option>
                    <option value="recital_event">発表会・公演</option>
                    <option value="get_well">お見舞い</option>
                    <option value="memorial">お供え・法事</option>
                    <option value="funeral">葬儀・供花</option>
                    <option value="home_use">自宅用</option>
                    <option value="business">法人・ビジネス</option>
                    <option value="other">その他</option>
                  </select>
                </div>
                <div class="field">
                  <label class="required" for="fulfillmentType">受取方法</label>
                  <select id="fulfillmentType" required>
                    <option value="pickup">店頭受取</option>
                    <option value="delivery">店舗配達</option>
                    <option value="shipping_consultation">配送相談</option>
                  </select>
                </div>
                <div class="field" id="dateField">
                  <label class="required" for="requestedDate">希望日</label>
                  <input id="requestedDate" type="date" required>
                </div>
                <div class="field full" id="slotField">
                  <label>希望時間</label>
                  <div id="slotGrid" class="slot-grid">
                    <span class="help">日付を選択してください。</span>
                  </div>
                  <input id="requestedAt" type="hidden">
                </div>
              </div>
            </article>

            <article id="recipientCard" class="card hidden" style="margin-top:18px">
              <h2>4. お届け先</h2>
              <div class="form-grid">
                <div class="field full">
                  <label for="savedAddress">登録済み届け先</label>
                  <select id="savedAddress">
                    <option value="">使用しない・直接入力</option>
                  </select>
                </div>
                <div class="field">
                  <label class="required" for="recipientName">受取人・会社名</label>
                  <input id="recipientName">
                </div>
                <div class="field">
                  <label class="required" for="recipientPhone">受取人電話番号</label>
                  <input id="recipientPhone" inputmode="tel">
                </div>
                <div class="field">
                  <label for="recipientPostalCode">郵便番号</label>
                  <input id="recipientPostalCode" inputmode="numeric">
                </div>
                <div class="field">
                  <label class="required" for="deliveryArea">配達エリア</label>
                  <select id="deliveryArea">
                    <option value="">選択してください</option>
                  </select>
                </div>
                <div class="field">
                  <label for="recipientPrefecture">都道府県</label>
                  <input id="recipientPrefecture" value="福岡県">
                </div>
                <div class="field">
                  <label for="recipientCity">市区町村</label>
                  <input id="recipientCity">
                </div>
                <div class="field full">
                  <label class="required" for="recipientAddress1">番地・建物名</label>
                  <input id="recipientAddress1">
                </div>
                <div class="field">
                  <label for="facilityName">会社・施設名</label>
                  <input id="facilityName">
                </div>
                <div class="field">
                  <label for="venueName">会場名</label>
                  <input id="venueName">
                </div>
                <div class="field full">
                  <label for="deliveryNote">配達時の注意</label>
                  <textarea id="deliveryNote" placeholder="例：到着前に電話、正面入口横へ設置"></textarea>
                </div>
              </div>
            </article>

            <article class="card" style="margin-top:18px">
              <h2>5. メッセージ・備考</h2>
              <div class="form-grid">
                <div class="field full">
                  <label for="messageText">メッセージカード</label>
                  <textarea id="messageText"></textarea>
                </div>
                <div class="field">
                  <label for="senderName">カードのお名前</label>
                  <input id="senderName">
                </div>
                <div class="field full">
                  <label for="customerNote">お客様のご希望</label>
                  <textarea id="customerNote"></textarea>
                </div>
                <div class="field full">
                  <label for="internalNote">店舗内メモ</label>
                  <textarea id="internalNote" placeholder="お客様には表示しない内部メモ"></textarea>
                </div>
              </div>
            </article>

            <article class="card" style="margin-top:18px">
              <div id="formAlert" class="hidden"></div>
              <div class="actions">
                <button id="submitButton" type="submit" class="btn btn-primary">この内容で注文を登録</button>
              </div>
            </article>
          </form>
        </section>
      </div>

      <footer class="footer">
        <div>DPRO フラワーショップ 電話・店頭注文</div>
        <div id="appVersion"></div>
      </footer>
    </section>
  </main>

  <nav class="mobile-bottom-nav" id="mobileNav"></nav>
  <script src="config.js?v=FLOWER-15"></script>
  <script src="common.js?v=FLOWER-15"></script>
  <script src="counter-v15.js"></script>
</body>
</html>
