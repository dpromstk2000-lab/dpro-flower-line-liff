<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#214c3b">
  <title>店頭・iPad受付｜DPRO フラワーショップ</title>
  <link rel="stylesheet" href="common.css?v=FLOWER-15">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">✿</div>
        <div>
          <div class="brand-title">DPRO フラワーショップ</div>
          <div class="brand-subtitle">注文・制作・配達管理 LINE</div>
        </div>
      </div>
      <nav class="topnav" id="topnav"></nav>
    </div>
  </header>
  
<main class="page-shell">
  <section id="adminLock" class="card admin-lock">
    <h2>店頭・iPad受付</h2>
    <div class="code-row">
      <input id="adminCode" type="password" inputmode="numeric" placeholder="管理コード">
      <button id="loginButton" class="btn btn-primary">開く</button>
      <button id="clearCodeButton" class="btn btn-danger">削除</button>
    </div>
    <div id="loginAlert" class="hidden"></div>
  </section>

  <section id="app" class="hidden">
    <section class="hero">
      <div class="eyebrow">COUNTER / iPAD</div>
      <h1>本日の注文を、大きなボタンで操作。</h1>
      <p>店頭受付、制作開始、完成、引渡しをタブレットから更新できます。</p>
    </section>

    <div class="toolbar">
      <div class="field">
        <label for="date">表示日</label>
        <input id="date" type="date">
      </div>
      <button id="reload" class="btn btn-primary">更新</button>
    </div>
    <div id="alert" class="hidden"></div>
    <div id="orders" class="grid grid-2"><div class="card loading">読み込み中…</div></div>

    <footer class="footer">
      <div>DPRO フラワーショップ 店頭・iPad受付</div>
      <div id="appVersion"></div>
    </footer>
  </section>
</main>

  <nav class="mobile-bottom-nav" id="mobileNav"></nav>
  <script src="config.js?v=FLOWER-15"></script>
  <script src="common.js?v=FLOWER-15"></script>
  <script src="owner-ipad-v9.js"></script>
</body>
</html>
