<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#214c3b">
  <title>オーナー管理｜DPRO フラワーショップ</title>
  <link rel="stylesheet" href="common.css?v=FLOWER-15">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">✿</div>
        <div>
          <div class="brand-title">DPRO フラワーショップ</div>
          <div class="brand-subtitle">注文・制作・配達管理 LINE</div>
        </div>
      </div>
      <nav class="topnav" id="topnav"></nav>
    </div>
  </header>
  
<main class="page-shell">
  <section id="adminLock" class="card admin-lock">
    <h2>オーナー管理画面</h2>
    <p>管理コードを入力してください。デモURLでは自動設定されます。</p>
    <div class="code-row">
      <input id="adminCode" type="password" inputmode="numeric" placeholder="管理コード">
      <button id="loginButton" class="btn btn-primary">開く</button>
      <button id="clearCodeButton" class="btn btn-danger">削除</button>
    </div>
    <div id="loginAlert" class="hidden"></div>
  </section>

  <section id="adminApp" class="hidden">
    <section class="hero">
      <div class="eyebrow">OWNER DASHBOARD</div>
      <h1>今日の注文・制作・配達を一画面で。</h1>
      <p>電話・店頭・LINEの注文をまとめて管理します。</p>
      <div class="hero-actions">
        <a class="btn btn-ghost" href="counter.html?demo=1">電話・店頭注文</a>
        <a class="btn btn-ghost" href="owner-ipad.html?demo=1">iPad受付画面</a>
        <a class="btn btn-rose" href="system-check.html?demo=1">システム検査</a>
      </div>
    </section>

    <div id="pageAlert" class="hidden"></div>

    <section class="grid grid-4">
      <article class="card stat"><span class="stat-label">本日の注文</span><span class="stat-value" id="statToday">0</span></article>
      <article class="card stat"><span class="stat-label">制作未完了</span><span class="stat-value" id="statProduction">0</span></article>
      <article class="card stat"><span class="stat-label">配達未完了</span><span class="stat-value" id="statDelivery">0</span></article>
      <article class="card stat"><span class="stat-label">未入金</span><span class="stat-value" id="statUnpaid">0</span></article>
    </section>

    <h2 class="section-title">今日の注文</h2>
    <div class="toolbar">
      <div class="field">
        <label for="dashboardDate">表示日</label>
        <input id="dashboardDate" type="date">
      </div>
      <button id="reloadDashboard" class="btn btn-secondary">更新</button>
    </div>
    <div id="todayOrders" class="table-wrap"><div class="loading">読み込み中…</div></div>

    <h2 class="section-title">注文検索・ステータス更新</h2>
    <div class="toolbar">
      <div class="field">
        <label for="orderStatusFilter">ステータス</label>
        <select id="orderStatusFilter">
          <option value="">すべて</option>
          <option value="new">新規受付</option>
          <option value="confirmed">注文確定</option>
          <option value="production_waiting">制作待ち</option>
          <option value="producing">制作中</option>
          <option value="completed">完成</option>
          <option value="delivery_preparing">配達準備</option>
          <option value="delivering">配達中</option>
          <option value="delivered">配達完了</option>
          <option value="handed_over">引渡し完了</option>
          <option value="cancelled">キャンセル</option>
        </select>
      </div>
      <div class="field">
        <label for="orderQuery">受付番号・備考</label>
        <input id="orderQuery" placeholder="検索">
      </div>
      <button id="searchOrders" class="btn btn-primary">検索</button>
    </div>
    <div id="ordersTable" class="table-wrap"><div class="loading">読み込み中…</div></div>

    <h2 class="section-title">顧客検索</h2>
    <div class="toolbar">
      <div class="field">
        <label for="customerQuery">氏名・電話番号・顧客番号・会社名</label>
        <input id="customerQuery" placeholder="例：09012345678">
      </div>
      <button id="searchCustomers" class="btn btn-primary">検索</button>
    </div>
    <div id="customerResults" class="grid grid-3"></div>

    <footer class="footer">
      <div>DPRO フラワーショップ オーナー管理</div>
      <div id="appVersion"></div>
    </footer>
  </section>
</main>

  <nav class="mobile-bottom-nav" id="mobileNav"></nav>
  <script src="config.js?v=FLOWER-15"></script>
  <script src="common.js?v=FLOWER-15"></script>
  <script src="owner-v15.js"></script>
</body>
</html>
