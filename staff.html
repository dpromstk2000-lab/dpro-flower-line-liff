<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#214c3b">
  <title>スタッフ作業｜DPRO フラワーショップ</title>
  <link rel="stylesheet" href="common.css?v=FLOWER-7-R2">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">✿</div>
        <div>
          <div class="brand-title">DPRO フラワーショップ</div>
          <div class="brand-subtitle">注文・制作・配達管理 LINE</div>
        </div>
      </div>
      <nav class="topnav" id="topnav"></nav>
    </div>
  </header>
  
<main class="page-shell">
  <section id="adminLock" class="card admin-lock">
    <h2>スタッフ用作業画面</h2>
    <div class="code-row">
      <input id="adminCode" type="password" inputmode="numeric" placeholder="管理コード">
      <button id="loginButton" class="btn btn-primary">開く</button>
      <button id="clearCodeButton" class="btn btn-danger">削除</button>
    </div>
    <div id="loginAlert" class="hidden"></div>
  </section>

  <section id="app" class="hidden">
    <section class="hero">
      <div class="eyebrow">STAFF TASKS</div>
      <h1>制作と配達、今日やることだけ。</h1>
      <p>制作開始・完成・出発・配達完了をスタッフ端末から登録します。</p>
    </section>

    <div class="toolbar">
      <div class="field">
        <label for="taskDate">表示日</label>
        <input id="taskDate" type="date">
      </div>
      <button id="reload" class="btn btn-primary">更新</button>
    </div>
    <div id="alert" class="hidden"></div>

    <h2 class="section-title">制作タスク</h2>
    <div id="productionTasks" class="grid grid-2"><div class="card loading">読み込み中…</div></div>

    <h2 class="section-title">配達タスク</h2>
    <div id="deliveryTasks" class="grid grid-2"><div class="card loading">読み込み中…</div></div>

    <footer class="footer">
      <div>DPRO フラワーショップ スタッフ作業</div>
      <div id="appVersion"></div>
    </footer>
  </section>
</main>

  <nav class="mobile-bottom-nav" id="mobileNav"></nav>
  <script src="config.js?v=FLOWER-7-R2"></script>
  <script src="common.js?v=FLOWER-7-R2"></script>
  <script src="staff.js?v=FLOWER-7-R2"></script>
</body>
</html>
